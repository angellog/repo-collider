<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Migrating…</title>
<style>
body{background:#06080d;color:#e2e8f0;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;flex-direction:column;gap:12px;text-align:center;padding:20px}
.spinner{width:28px;height:28px;border:3px solid #1e293b;border-top-color:#6366f1;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{color:#fb7185;font-size:14px;max-width:500px;line-height:1.6}
.success{color:#4ade80}
.hint{color:#64748b;font-size:12px}
a{color:#818cf8}
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div id="status">Reading your local data…</div>

<script>
(async function(){
  const status = document.getElementById('status');
  const spinner = document.getElementById('spinner');

  try {
    const keys = Object.keys(localStorage).filter(k => k.startsWith('rc-'));
    if (!keys.length) {
      spinner.remove();
      status.innerHTML = '<div class="error">No Repo Collider data found in localStorage.</div><div class="hint">Use the app at <a href="/">localhost:3000</a> to generate ideas first.</div>';
      return;
    }

    const data = {};
    keys.forEach(k => {
      try { data[k] = JSON.parse(localStorage.getItem(k)); }
      catch(e) { data[k] = localStorage.getItem(k); }
    });
    data._exportedAt = new Date().toISOString();
    data._version = 'repo-collider-v2';

    status.textContent = `Found ${keys.length} keys — saving to server…`;

    // POST backup to server first
    const res = await fetch('/api/backup', {
      method: 'POST',
      headers: {'content-type':'application/json'},
      body: JSON.stringify(data),
    });
    if (!res.ok) throw new Error('Server save failed');
    const result = await res.json();
    status.textContent = `Saved ${result.keys} keys. Redirecting to deployed app…`;

    // Encode and redirect
    const json = JSON.stringify(data);
    const encoded = btoa(unescape(encodeURIComponent(json)));

    if (encoded.length > 80000) {
      spinner.remove();
      status.innerHTML = '<div class="hint">Data too large for URL (' + (encoded.length/1024).toFixed(1) + 'KB).<br>Backup saved to server. Use <strong>📦 Export</strong> → <strong>📥 Import</strong> manually.</div>';
      return;
    }

    await new Promise(r => setTimeout(r, 500));
    window.location.href = 'https://rc-v4.vercel.app/#import:' + encoded;

  } catch(e) {
    spinner.remove();
    status.innerHTML = '<div class="error">❌ ' + e.message.slice(0, 80) + '</div>';
  }
})();
</script>
</body>
</html>
